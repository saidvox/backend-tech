spring:
  config:
    import: optional:file:.env[.properties],optional:file:backend/.env[.properties]
  application:
    name: techstore-pro-backend
  profiles:
    active: postgres
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:google-client-id-disabled}
            client-secret: ${GOOGLE_CLIENT_SECRET:google-client-secret-disabled}
            scope:
              - openid
              - profile
              - email
  datasource:
    url: jdbc:h2:mem:techstore;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

app:
  datasource:
    auto-detect: ${APP_DATASOURCE_AUTO_DETECT:true}
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://127.0.0.1:4200
  jwt:
    secret: ${JWT_SECRET:techstore-pro-dev-secret-key-change-in-production-123456}
    issuer: ${JWT_ISSUER:techstore-pro}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:4200/auth/oauth2/success}
    failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:4200/login}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/techstore}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:techstore}
    password: ${DB_PASSWORD:techstore123}
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: false
