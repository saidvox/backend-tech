spring:
  application:
    name: techstore-pro-backend
  datasource:
    url: jdbc:h2:mem:techstore;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

app:
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://127.0.0.1:4200
  jwt:
    secret: ${JWT_SECRET:techstore-pro-dev-secret-key-change-in-production-123456}
    issuer: ${JWT_ISSUER:techstore-pro}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/techstore}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:techstore}
    password: ${DB_PASSWORD:techstore123}
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: false
