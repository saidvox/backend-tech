services:
  postgres:
    image: postgres:16-alpine
    container_name: techstore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-techstore}
      POSTGRES_USER: ${POSTGRES_USER:-techstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-techstore123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - techstore_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - techstore_backend

networks:
  techstore_backend:
    driver: bridge

volumes:
  techstore_postgres_data:
    driver: local
